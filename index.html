<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <header class="header">
      <h1>💰 Mis Finanzas</h1>
    </header>

    <main>

      <!-- HOME -->
      <section id="home" class="screen active">

        <div class="balance-card">
          <h2 id="balance">RD$ 0</h2>
          <p>Balance total</p>
        </div>

        <div class="resumen-grid">
          <div class="card">
            <h3>Ingresos</h3>
            <p id="ingresos">RD$ 0</p>
          </div>
          <div class="card">
            <h3>Gastos</h3>
            <p id="gastos">RD$ 0</p>
          </div>
          <div class="card">
            <h3>Fijos</h3>
            <p id="fijos">RD$ 0</p>
          </div>
        </div>

        <div class="form">
          <input id="descripcion" placeholder="Descripción">
          <input id="monto" type="number" placeholder="Monto">

          <select id="categoria">
            <option value="General">General</option>
            <option value="Comida">🍔 Comida</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Casa">🏠 Casa</option>
            <option value="Entretenimiento">🎮 Entretenimiento</option>
          </select>

          <select id="fuenteIngreso">
            <option value="">Tipo de Ingreso</option>
            <option value="ML Studio">🎧 ML Studio</option>
            <option value="Longport">✈️ Longport</option>
            <option value="Extra">💼 Extra</option>
          </select>

          <select id="tipoGasto">
            <option value="variable">Variable</option>
            <option value="fijo">Fijo</option>
          </select>

          <div class="buttons">
            <button class="ingreso" onclick="agregar('ingreso')">+ Ingreso</button>
            <button class="gasto" onclick="agregar('gasto')">- Gasto</button>
          </div>
        </div>

      </section>

      <!-- REPORTES -->
      <<section id="reportes" class="screen">
  <h2>📊 Gastos por categoría</h2>
  <canvas id="grafica"></canvas>

  <h2>💰 Ingresos por fuente</h2>
  <canvas id="graficaIngresos"></canvas>
</section>

      <!-- HISTORIAL -->
      <section id="historial" class="screen">
        <h2>📋 Movimientos</h2>
        <ul id="lista"></ul>
      </section>

    </main>

    <!-- NAV -->
    <nav class="bottom-nav">
      <button onclick="cambiarVista('home')">🏠</button>
      <button onclick="cambiarVista('reportes')">📊</button>
      <button onclick="cambiarVista('historial')">📋</button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
